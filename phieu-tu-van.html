    phuongphap:"Xạ trị kỹ thuật IMRT; đeo mặt nạ cố định (nếu có chỉ định)." },
  { ten:"Chung (mọi mặt bệnh)", mb:"chung",
    s1:"Bác được chẩn đoán bệnh lý ung thư có chỉ định xạ trị; bác sĩ đã giải thích tình trạng và mục tiêu điều trị.",
    phuongphap:"Xạ trị kỹ thuật IMRT; đeo mặt nạ cố định (nếu có chỉ định)." }
];

/* ============================================================ */
function esc(s){return(s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
const $=id=>document.getElementById(id);
function lines(n){var s="";for(var i=0;i<n;i++)s+='<div class="wl"></div>';return s;}
function bullets(t){return (t||"").split("\n").map(function(l){return '<div>'+esc(l)+'</div>';}).join("");}
function val(id){return ($(id).value||"").trim();}
function or(id,alt){return val(id)?esc(val(id)):(alt||"................................");}

function init(){
  $("mp").innerHTML=FORMS.map((f,i)=>`<option value="${i}">${esc(f.ten)}</option>`).join("");
  $("bs").innerHTML='<option value="">— Chọn bác sĩ điều trị —</option>'+DOCTORS.map(d=>`<option>${esc(d)}</option>`).join("");
  loadForm();
}
function loadForm(){
  const f=FORMS[+$("mp").value]||FORMS[0];
  $("s1").value=f.s1||""; $("phuongphap").value=f.phuongphap||"";
  ["muctieu","lieu","sobuoi"].forEach(id=>{ if(f[id]!==undefined) $(id).value=f[id]; });
  $("lieutrinh").value = (f.lieutrinh!==undefined) ? f.lieutrinh : LIEUTRINH_MAU;
  $("link").value = (f.mb && KHO_URL) ? (KHO_URL+(KHO_URL.indexOf("?")<0?"?":"&")+"mb="+f.mb) : "";
  render();
}
function resetPt(){ ["ten","tuoi","cd","muctieu","lieu","sobuoi","lieutrinh"].forEach(id=>$(id).value=""); render(); }

function render(){
  const bs=$("bs").value;
  const fcur=FORMS[+$("mp").value]||FORMS[0];
  const se=fcur.se||SIDE_EFFECTS;
  const link=val("link");
  const dot="................................................";
  const qr = link ? `<img class="qri" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(link)}">` : "";
  const sec1 = (val("s1")? '<div class="body">'+esc(val("s1"))+'</div>' : '') + lines(4);

  $("preview").innerHTML=`<div class="a4">
    <div class="hd">
      <div class="l">${esc(HOSPITAL_L)}<br>${esc(KHO_L)}</div>
      <div>Ngày ...... / ...... / ..........</div>
    </div>
    <div class="title">${esc(TITLE)}</div>
    <div class="pt">
      <div>Bệnh nhân: <b>${or("ten",dot)}</b> &nbsp;&nbsp; Tuổi: ${or("tuoi","........")}</div>
      <div>Bác sĩ điều trị: <b>${bs?esc(bs):"................................"}</b></div>
      <div>Chẩn đoán: <b>${or("cd",dot)}</b></div>
    </div>

    <table class="cols"><tr>
      <td class="col col-left">
        <div class="colfill">
          <div class="sec"><h3>1. Tình hình bệnh</h3><div class="ruled16">${esc(val("s1"))}</div></div>
          <div class="grow"></div>
          <div class="sec"><h3>2. Điều trị và kế hoạch điều trị</h3>
            <div class="sub"><b>Mục tiêu điều trị:</b> ${or("muctieu","..............................................")}</div>
            <div class="sub"><b>Phương pháp điều trị:</b> ${val("phuongphap")?esc(val("phuongphap")):".............................................."}</div>
            <div class="sub"><b>Tổng liều xạ trị:</b> ${or("lieu",".........")} Gy &nbsp;&nbsp;–&nbsp;&nbsp; <b>Số buổi xạ trị:</b> ${or("sobuoi",".........")}</div>
            <div class="sub" style="white-space:pre-wrap"><b>Liệu trình:</b> ${val("lieutrinh")?esc(val("lieutrinh")):".............................................."}</div>
            <div class="sub" style="white-space:pre-wrap"><b>Quy trình xạ trị:</b>
${esc(QUYTRINH)}</div>
            <div class="sub" style="white-space:pre-wrap"><b>Trong buổi xạ trị:</b>
${esc(TRONGXA)}</div>
          </div>
        </div>
      </td>
      <td class="col">
        <div class="sec"><h3>3. Tác dụng phụ thường gặp &amp; cách xử trí, chăm sóc</h3>
          ${qr}
          <div class="body">${esc(se)}</div>
          <div class="sub">${esc(SKIN_CARE)}</div>
          <div class="sub">👉 Ông/Bà có thể quét <b>mã QR</b> để đọc thêm tài liệu chi tiết theo mặt bệnh.</div>
        </div>
        <div class="sec warn"><h3>4. Các dấu hiệu cần báo bác sĩ ngay</h3><div class="body">${esc(WARNING)}</div></div>
        <div class="sec"><h3>5. Dinh dưỡng, chăm sóc</h3><div class="body">${esc(CARE_GENERAL)}</div></div>
        <div class="sec"><h3>6. Lịch tái khám trong quá trình xạ trị</h3><div class="body">${esc(RECHECK)}</div></div>
        <div class="contact"><b>Thông tin liên hệ</b>${esc(CONTACT).split("\n").map(l=>'<div style="margin-top:2px">'+l+'</div>').join("")}<div style="margin-top:5px;font-style:italic">Chúng tôi luôn đồng hành cùng Ông/Bà trong suốt quá trình điều trị.</div></div>
      </td>
    </tr></table><!--/cols-->

    <div class="foot">${esc(FOOTER)}</div>
  </div>`;
}
init();
</script>
</body>
</html>
